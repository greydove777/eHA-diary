<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 頭痛日記</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0; padding:0;">
    <div id="root"></div>

    <script type="text/babel">
        // 從 React 物件中取出 Hook
        const { useState, useEffect, useCallback } = React;

        const SYMPTOMS = ["噁心或嘔吐", "怕光", "怕吵", "搏動性疼痛", "單側頭痛", "活動使頭痛加劇"];
        const MEDICATIONS = ["未服藥", "布洛芬", "普拿疼／乙醯胺酚", "阿斯匹靈", "舒馬曲坦", "利紮曲坦", "萘普生", "其他"];

        const today = () => {
          const d = new Date();
          return { year: d.getFullYear(), month: d.getMonth() + 1, day: d.getDate() };
        };

        const defaultDayEntry = () => ({
          morning: "", afternoon: "", evening: "", symptoms: [], duration: "",
          medication: "未服藥", medicationEffect: "", stress: "", exercise: "",
        });

        const C = {
          bg: "linear-gradient(160deg, #e8f5fb 0%, #d2eaf8 50%, #bcdff5 100%)",
          card: "rgba(255,255,255,0.82)",
          cardBorder: "rgba(74,154,191,0.18)",
          primary: "#2a82aa", primaryLight: "#4a9abf", text: "#1a3a52",
          textMid: "#4a7a9a", textLight: "#7aaac8", pillActive: "rgba(74,154,191,0.2)",
          pillActiveBorder: "#4a9abf", pillActiveText: "#1a5a7a", pillText: "#5a8aaa",
          pillBorder: "rgba(74,138,176,0.25)", pillBg: "rgba(255,255,255,0.7)",
          green: "#2a9a6a", orange: "#e09020", red: "#d04040",
        };

        const FF = "'Microsoft JhengHei','Noto Sans TC','PingFang TC',sans-serif";
        const painColor = (v) => {
          const n = parseInt(v);
          if (!n || n === 0) return C.textLight;
          if (n <= 3) return C.green;
          if (n <= 6) return C.orange;
          return C.red;
        };
        const daysInMonth = (year, month) => new Date(year, month, 0).getDate();
        const monthKey = (y, m) => `${y}-${String(m).padStart(2, "0")}`;

        function HeadacheDiary() {
          const t = today();
          const [year, setYear] = useState(t.year);
          const [month, setMonth] = useState(t.month);
          const [selectedDay, setSelectedDay] = useState(t.day);
          const [monthData, setMonthData] = useState({});
          const [view, setView] = useState("calendar");
          const [nextVisit, setNextVisit] = useState("");

          const key = monthKey(year, month);

          useEffect(() => {
            try {
              const saved = localStorage.getItem(`headache-tw-${key}`);
              if (saved) setMonthData(JSON.parse(saved));
              else setMonthData({});
              const nv = localStorage.getItem(`headache-nextvisit-${key}`);
              if (nv) setNextVisit(nv);
              else setNextVisit("");
            } catch {}
          }, [key]);

          const saveDay = useCallback((day, data) => {
            const updated = { ...monthData, [day]: data };
            setMonthData(updated);
            try { localStorage.setItem(`headache-tw-${key}`, JSON.stringify(updated)); } catch {}
          }, [monthData, key]);

          const saveNextVisit = (val) => {
            setNextVisit(val);
            try { localStorage.setItem(`headache-nextvisit-${key}`, val); } catch {}
          };

          const getDayEntry = (day) => monthData[day] || defaultDayEntry();
          const currentEntry = getDayEntry(selectedDay);

          const updateEntry = (field, value) => {
            saveDay(selectedDay, { ...currentEntry, [field]: value });
          };

          const toggleSymptom = (s) => {
            const list = currentEntry.symptoms || [];
            const updated = list.includes(s) ? list.filter(x => x !== s) : [...list, s];
            updateEntry("symptoms", updated);
          };

          const hasData = (day) => {
            const e = monthData[day];
            if (!e) return false;
            return e.morning || e.afternoon || e.evening || (e.symptoms && e.symptoms.length > 0);
          };

          const maxPain = (day) => {
            const e = monthData[day];
            if (!e) return 0;
            return Math.max(parseInt(e.morning) || 0, parseInt(e.afternoon) || 0, parseInt(e.evening) || 0);
          };

          const totalDays = daysInMonth(year, month);
          const firstDay = new Date(year, month - 1, 1).getDay();

          const prevMonth = () => {
            if (month === 1) { setYear(y => y - 1); setMonth(12); }
            else setMonth(m => m - 1);
            setSelectedDay(1);
          };
          const nextMonth = () => {
            if (month === 12) { setYear(y => y + 1); setMonth(1); }
            else setMonth(m => m + 1);
            setSelectedDay(1);
          };

          const headacheDays = Object.entries(monthData).filter(([, e]) =>
            parseInt(e.morning) > 0 || parseInt(e.afternoon) > 0 || parseInt(e.evening) > 0
          ).length;
          const medDays = Object.values(monthData).filter(e => e.medication && e.medication !== "未服藥").length;
          const allPains = Object.values(monthData).flatMap(e =>
            [parseInt(e.morning)||0, parseInt(e.afternoon)||0, parseInt(e.evening)||0].filter(v => v > 0)
          );
          const avgPain = allPains.length ? (allPains.reduce((a,b)=>a+b,0)/allPains.length).toFixed(1) : "–";

          const symptomCount = {};
          Object.values(monthData).forEach(e => (e.symptoms||[]).forEach(s => symptomCount[s]=(symptomCount[s]||0)+1));
          const topSymptoms = Object.entries(symptomCount).sort((a,b)=>b[1]-a[1]);

          const S = {
            root: { minHeight: "100vh", background: C.bg, color: C.text, fontFamily: FF, display: "flex", flexDirection: "column", alignItems: "center" },
            header: { width: "100%", maxWidth: 520, padding: "18px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" },
            main: { width: "100%", maxWidth: 520, padding: "16px 20px 32px", flex: 1 },
            card: { background: C.card, border: `1px solid ${C.cardBorder}`, borderRadius: 16, padding: 20, marginBottom: 14, boxShadow: "0 2px 14px rgba(74,154,191,0.08)" },
            navBtn: a => ({ background: a ? "rgba(74,154,191,0.16)" : "transparent", border: "none", color: a ? C.primary : C.textLight, fontSize: 13, padding: "6px 12px", cursor: "pointer", borderRadius: 6, fontFamily: FF }),
            label: { fontSize: 11, letterSpacing: "0.08em", color: C.textLight, marginBottom: 6, display: "block", textTransform: "uppercase" },
            input: { background: "rgba(255,255,255,0.85)", border: `1px solid rgba(74,138,176,0.3)`, borderRadius: 8, color: C.text, padding: "9px 12px", fontSize: 15, fontFamily: FF, boxSizing: "border-box" },
            pill: a => ({ display: "inline-block", padding: "7px 14px", margin: "3px", borderRadius: 20, border: `1px solid ${a ? C.pillActiveBorder : C.pillBorder}`, background: a ? C.pillActive : C.pillBg, color: a ? C.pillActiveText : C.pillText, fontSize: 13, cursor: "pointer", fontFamily: FF }),
            primaryBtn: { background: `linear-gradient(135deg, ${C.primaryLight}, ${C.primary})`, border: "none", borderRadius: 10, color: "#fff", padding: "12px 24px", fontSize: 15, fontFamily: FF, cursor: "pointer", boxShadow: "0 3px 12px rgba(42,130,170,0.22)" },
            backBtn: { background: "rgba(255,255,255,0.7)", border: `1px solid rgba(74,138,176,0.25)`, borderRadius: 10, color: C.textMid, padding: "10px 18px", fontSize: 14, fontFamily: FF, cursor: "pointer" },
          };

          const exportPDF = () => {
            const totalDaysN = daysInMonth(year, month);
            const rows = Array.from({ length: totalDaysN }, (_, i) => i + 1).map(day => {
              const e = monthData[day] || defaultDayEntry();
              return { day, ...e };
            });

            const html = `<html><head><meta charset="UTF-8"/><style>body{font-family:sans-serif;font-size:11px;}table{width:100%;border-collapse:collapse;}th,td{border:1px solid #ccc;padding:5px;text-align:center;}</style></head><body><h2>${year}年${month}月頭痛日記</h2><table><thead><tr><th>日期</th><th>早</th><th>午</th><th>晚</th><th>持續</th><th>藥物</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.day}</td><td>${r.morning}</td><td>${r.afternoon}</td><td>${r.evening}</td><td>${r.duration}</td><td>${r.medication}</td></tr>`).join("")}</tbody></table></body></html>`;
            const win = window.open("", "_blank");
            win.document.write(html);
            win.document.close();
            setTimeout(() => win.print(), 500);
          };

          const CalendarView = () => (
            <div>
              <div style={S.card}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
                  <button onClick={prevMonth} style={S.backBtn}>‹</button>
                  <div style={{ textAlign: "center", fontSize: 18, fontWeight: "bold", color: C.primary }}>{year} 年 {month} 月</div>
                  <button onClick={nextMonth} style={S.backBtn}>›</button>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4 }}>
                  {Array.from({ length: firstDay }).map((_, i) => <div key={i} />)}
                  {Array.from({ length: totalDays }, (_, i) => i + 1).map(day => (
                    <div key={day} onClick={() => { setSelectedDay(day); setView("entry"); }} 
                      style={{ textAlign: "center", padding: "8px", borderRadius: 8, background: hasData(day) ? "rgba(42,130,170,0.1)" : "#fff", border: `1px solid ${day === selectedDay ? C.primary : "#eee"}`, cursor: "pointer" }}>
                      {day}
                    </div>
                  ))}
                </div>
              </div>
              <button style={{ ...S.primaryBtn, width: "100%" }} onClick={() => setView("stats")}>查看統計數據</button>
            </div>
          );

          const EntryView = () => (
            <div>
              <button style={S.backBtn} onClick={() => setView("calendar")}>← 返回月曆</button>
              <div style={{...S.card, marginTop: 15}}>
                <h3>{selectedDay}日 紀錄</h3>
                <label style={S.label}>早上疼痛 (0-10)</label>
                <input type="number" value={currentEntry.morning} onChange={e => updateEntry("morning", e.target.value)} style={{...S.input, width: "100%", marginBottom: 10}} />
                <label style={S.label}>下午疼痛 (0-10)</label>
                <input type="number" value={currentEntry.afternoon} onChange={e => updateEntry("afternoon", e.target.value)} style={{...S.input, width: "100%", marginBottom: 10}} />
                <label style={S.label}>晚上疼痛 (0-10)</label>
                <input type="number" value={currentEntry.evening} onChange={e => updateEntry("evening", e.target.value)} style={{...S.input, width: "100%", marginBottom: 10}} />
                <label style={S.label}>伴隨症狀</label>
                {SYMPTOMS.map(s => <button key={s} style={S.pill(currentEntry.symptoms.includes(s))} onClick={() => toggleSymptom(s)}>{s}</button>)}
              </div>
            </div>
          );

          return (
            <div style={S.root}>
              <div style={S.header}>
                <span style={{ fontSize: 18, fontWeight: "bold", color: C.primary }}>🧠 頭痛日記</span>
                <button style={S.navBtn(false)} onClick={exportPDF}>🖨️ PDF</button>
              </div>
              <div style={S.main}>
                {view === "calendar" && <CalendarView />}
                {view === "entry" && <EntryView />}
                {view === "stats" && <div><h3>統計畫面</h3><button onClick={()=>setView("calendar")}>返回</button></div>}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HeadacheDiary />);
    </script>
</body>
</html>
